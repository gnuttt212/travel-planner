spring:
  application:
    name: travel-planner
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/travel_planner}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update # doi thanh "validate" va dung Flyway/Liquibase khi len production that
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:K7mZ9pQxR2vN8wLtF3jH5yB6cD1sA4eU0iO7gM2nX9k=}
  expiration: 86400000

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    url: "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent"

ors:
  api:
    key: ${ORS_API_KEY:}
    url: "https://api.openrouteservice.org"

openweathermap:
  api:
    key: ${OPENWEATHERMAP_API_KEY:}
    url: "https://api.openweathermap.org/data/2.5/forecast"

rate-limit:
  requests-per-minute: 5
