name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install @google/generative-ai @actions/github

      - name: Get PR Diff & Run Gemini Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v7
        with:
          script: |
            const { GoogleGenAI } = require('@google/generative-ai');
            const fs = require('fs');
            const execSync = require('child_process').execSync;

            // 1. Lấy thông tin PR
            const pr = context.payload.pull_request;
            const prTitle = pr.title;
            const prBody = pr.body || "Không có mô tả";

            // 2. Lấy Git Diff giữa nhánh PR và nhánh đích (main)
            let gitDiff = "";
            try {
              execSync('git fetch origin ' + pr.base.ref);
              gitDiff = execSync(`git diff origin/${pr.base.ref}...HEAD`).toString();
            } catch (error) {
              console.error("Không thể lấy git diff:", error);
              return;
            }

            if (!gitDiff.trim()) {
              console.log("Không có sự thay đổi nào trong code.");
              return;
            }

            // Giới hạn độ dài diff tránh tràn Token (khoảng 40k ký tự đầu)
            if (gitDiff.length > 40000) {
              gitDiff = gitDiff.substring(0, 40000) + "\n\n[... Diff quá dài, đã bị cắt bớt ...]";
            }

            // 3. Gọi Gemini API
            const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });
            const systemInstruction = `Bạn là một Senior Full-Stack Engineer và là Chuyên gia Code Reviewer xuất sắc. Bạn có chuyên môn sâu sắc về Java 17+, Spring Boot 3, React, Vite, TypeScript, PostgreSQL (pgvector). Nhiệm vụ của bạn là kiểm tra đoạn Git Diff và đưa ra các nhận xét lỗi logic, bảo mật, hiệu năng mang tính xây dựng. CHỈ nhận xét nếu phát hiện ra vấn đề cần sửa đổi. Viết phản hồi bằng tiếng Việt ngắn gọn, trực diện sử dụng Markdown.`;

            const userPrompt = `Dưới đây là thông tin và đoạn Git Diff của Pull Request. Hãy review giúp tôi:\n\nTiêu đề PR: ${prTitle}\nMô tả: ${prBody}\n\nGit Diff:\n${gitDiff}`;

            try {
              const response = await ai.models.generateContent({
                model: 'gemini-2.5-flash',
                contents: userPrompt,
                config: { systemInstruction: systemInstruction }
              });

              const reviewResult = response.text;

              // 4. Tạo Comment lên GitHub Pull Request
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `### 🤖 Trợ Lý AI Review Code\n\n${reviewResult}`
              });

            } catch (aiError) {
              console.error("Lỗi khi gọi Gemini API:", aiError);
            }
